<!DOCTYPE html>
<html>
<head>
  <title>Kumari Ella Trip</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      height: 100%;
      font-family: Arial, sans-serif;
      background: #020617;
      color: white;
      overflow: hidden;
    }

    .header {
      height: 60px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .header h1 { margin: 0; font-size: 16px; }
    .header p { margin: 0; font-size: 11px; opacity: 0.8; }

    #countdown {
      font-size: 11px;
      color: #38bdf8;
      margin-top: 2px;
    }

    #map {
      height: calc(100vh - 60px);
      width: 100%;
    }

    /* START SCREEN */
    #startScreen {
      position: fixed;
      inset: 0;
      background: radial-gradient(circle, #0f172a, #020617);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 999;
    }

    .startBtn {
      margin-top: 15px;
      background: linear-gradient(135deg,#22c55e,#4ade80);
      border: none;
      padding: 14px 20px;
      border-radius: 14px;
      font-size: 16px;
      color: white;
    }

    /* Bottom card */
    #overlay {
      position: fixed;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      width: 92%;
      background: rgba(17,24,39,0.95);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      padding: 12px;
      display: none;
      flex-direction: column;
    }

    .btn {
      margin-top: 6px;
      padding: 10px;
      background: linear-gradient(135deg,#3b82f6,#7c3aed);
      color: white;
      border-radius: 10px;
      text-align: center;
      text-decoration: none;
      font-size: 13px;
      display: block;
    }
  </style>
</head>

<body>

<!-- ✅ MUSIC -->
<audio id="bg-music" preload="auto" src="Music.mp3"></audio>

<!-- START SCREEN -->
<div id="startScreen">
  <h2>🌿 Ready for Kumari Ella?</h2>
  <button class="startBtn" onclick="startTrip()">I’m coming 😎</button>
</div>

<div class="header">
  <h1>🚗 Kumari Ella Trip</h1>
  <p>11th July • Colombo → Avissawella</p>
  <div id="countdown"></div>
</div>

<div id="map"></div>

<!-- BUTTONS -->
<div id="overlay">
  <h3>📅 Lock the Date</h3>

  <a class="btn"
     href="https://calendar.google.com/calendar/render?action=TEMPLATE&text=Kumari+Ella+Trip&dates=20260711T030000Z/20260711T120000Z&details=Trip+to+Kumari+Ella&location=Avissawella"
     target="_blank">
     Add to Google Calendar
  </a>

  <a class="btn" href="kumari-ella.ics" download>
     Download Calendar Invite
  </a>
</div>

<!-- ✅ CONFETTI -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<!-- ✅ GOOGLE MAPS -->
<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDwp-bZnCNeldSbYlOyX0I_bfVdYPx5bSE&callback=initMap" async defer></script>

<script>

let map, routePath, route = [], carMarker;
let index = 0;

function initMap() {

  const start = "60 Jawatta Rd, Colombo 00500";
  const end = "No 200/13/5 Ferriby Estate, Avissawella 10712";

  map = new google.maps.Map(document.getElementById("map"), {
    zoom: 12,
    center: { lat: 6.9271, lng: 79.8612 },
    disableDefaultUI: true
  });

  const directionsService = new google.maps.DirectionsService();

  routePath = new google.maps.Polyline({
    path: [],
    strokeColor: "#3b82f6",
    strokeOpacity: 0,
    strokeWeight: 6
  });

  routePath.setMap(map);

  directionsService.route({
    origin: start,
    destination: end,
    travelMode: "DRIVING"
  }, (res, status) => {

    if (status === "OK") {
      route = res.routes[0].overview_path;

      const bounds = new google.maps.LatLngBounds();
      route.forEach(p => bounds.extend(p));
      map.fitBounds(bounds);
    }
  });
}

/* CLICK */
function startTrip() {

  const audio = document.getElementById("bg-music");

  // ✅ browser-safe play
  audio.muted = true;
  audio.play();

  setTimeout(() => {
    audio.muted = false;
    audio.volume = 1;
  }, 100);

  // 🎉 Confetti
  confetti({ particleCount: 120, spread: 80 });

  // 📳 Vibration
  if (navigator.vibrate) {
    navigator.vibrate([100, 50, 100]);
  }

  document.getElementById("startScreen").style.display = "none";

  setTimeout(() => cinematicStart(), 300);
}

/* Zoom start */
function cinematicStart() {
  map.setZoom(14);
  setTimeout(() => animateRoute(), 500);
}

/* Animation */
function animateRoute() {

  if (index < route.length) {

    routePath.getPath().push(route[index]);

    // ✨ glowing
    routePath.setOptions({
      strokeOpacity: 0.7 + Math.sin(index / 5) * 0.3
    });

    if (!carMarker) {
      carMarker = new google.maps.Marker({
        position: route[index],
        map: map,
        icon: {
          url: "https://maps.google.com/mapfiles/kml/shapes/cabs.png",
          scaledSize: new google.maps.Size(32, 32)
        }
      });
    } else {
      carMarker.setPosition(route[index]);
    }

    map.panTo(route[index]);

    index++;
    setTimeout(animateRoute, 90);

  } else {
    document.getElementById("overlay").style.display = "flex";
  }
}

</script>

<script>
/* COUNTDOWN */
const tripDate = new Date("July 11, 2026 08:30:00").getTime();

setInterval(() => {
  const now = new Date().getTime();
  const diff = tripDate - now;

  const d = Math.floor(diff / (1000*60*60*24));
  const h = Math.floor((diff % (1000*60*60*24)) / (1000*60*60));
  const m = Math.floor((diff % (1000*60*60)) / (1000*60));

  document.getElementById("countdown").innerHTML =
    `⏳ ${d}d ${h}h ${m}m`;
}, 1000);
</script>

</body>
</html>
``
